# Alembic configuration for Relay.
# The DB URL is NOT set here; env.py reads it from relay.config.settings.database_url
# (async, asyncpg driver). Run from the backend/ directory:  alembic upgrade head

[alembic]
script_location = relay/migrations
prepend_sys_path = .
path_separator = os
# Timezone-aware UTC timestamps in revision filenames.
timezone = UTC

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
