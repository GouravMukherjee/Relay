# Relay backend — single-VM container stack (EC2 or any Docker host).
#
# Postgres is NOT here: the app uses Supabase (DATABASE_URL in .env). This stack
# runs Redis + the three app processes from ONE image. The gateway is published
# directly on port 8000 — no reverse proxy / TLS termination here. If you need
# HTTPS, put the backend behind a load balancer, or front it with the Vercel
# rewrite proxy (frontend/vercel.json), which proxies the browser's HTTPS calls
# to this plain-HTTP backend.
#
# Quick start (on the host):
#   cp .env.example .env && $EDITOR .env          # fill every key
#   docker compose up -d --build
#   docker compose run --rm migrate               # once (idempotent)
#   curl http://localhost:8000/health             # -> {"status":"ok"}
#
# Notes:
# - REDIS_URL is overridden to the in-network redis service (the .env value points
#   at localhost, which inside a container is the container itself).
# - .env is read at `up` time and injected as env — secrets are never baked into
#   the image (see .dockerignore).

x-relay: &relay
  build:
    context: .
    dockerfile: Dockerfile
  image: relay-backend:latest
  restart: unless-stopped
  env_file: [.env]
  environment:
    - REDIS_URL=redis://redis:6379/0
  depends_on:
    redis:
      condition: service_healthy

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Public REST + WebSocket hub, published directly on the host's port 8000.
  gateway:
    <<: *relay
    command: uvicorn relay.gateway.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # LiveKit agent worker — dials OUT to LiveKit Cloud, no inbound port.
  agent:
    <<: *relay
    command: python -m relay.agent.worker start
    depends_on:
      redis:
        condition: service_healthy
      gateway:
        condition: service_started

  # arq ingestion worker — consumes the Redis queue.
  ingest:
    <<: *relay
    command: arq relay.ingestion.worker.WorkerSettings

  # One-off schema migration against Supabase. Run explicitly:
  #   docker compose run --rm migrate
  migrate:
    <<: *relay
    command: alembic -c alembic.ini upgrade head
    restart: "no"
    depends_on: []
    profiles: ["tools"]

volumes:
  redis_data:
