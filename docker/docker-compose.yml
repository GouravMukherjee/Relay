# Relay backend — local stack. Mirrors the TrueFoundry topology:
#   postgres (pgvector)  +  gateway  +  retrieval  +  worker
# All three app services share one image; only the command differs.
#
#   cp .env.example .env   # fill in keys
#   docker compose up --build
#   curl localhost:8000/healthz   # gateway
#   curl localhost:8001/healthz   # retrieval

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro   # 01_schema.sql runs on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    image: relay-backend:local
    command: uvicorn app.gateway:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  retrieval:
    build: .
    image: relay-backend:local      # reuse the image built by `gateway`
    command: uvicorn app.retrieval:app --host 0.0.0.0 --port 8001
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build: .
    image: relay-backend:local
    command: python -m app.worker     # no inbound port — always-on process
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      retrieval:
        condition: service_started

volumes:
  pgdata:
